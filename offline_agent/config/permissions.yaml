safety:
  dry_run_default: true
  max_file_size_mb: 50
  max_command_timeout_sec: 120
  action_log_path: "logs/actions.jsonl"
  kill_switch_file: "config/.kill_switch"
  snapshot_path: "logs/snapshots/"

  blocked_commands:
    - "rm "
    - "rm -"
    - "rmdir"
    - "del "
    - "del /"
    - "rd "
    - "rd /"
    - "shutil.rmtree"
    - "os.remove"
    - "os.unlink"
    - "unlink("
    - "fs.unlinkSync"
    - "fs.rmdirSync"
    - "fs.rmSync"
    - "git push --force"
    - "git push -f"
    - "git reset --hard"
    - "git clean -f"
    - "git checkout -- ."
    - "git branch -D"
    - "git branch --delete --force"
    - "DROP TABLE"
    - "DROP DATABASE"
    - "TRUNCATE"
    - "DELETE FROM"
    - "reg add"
    - "reg delete"
    - "regedit"
    - "netsh"
    - "sc delete"
    - "sc stop"
    - "taskkill"
    - "shutdown"
    - "format "
    - "pip install"
    - "npm install"
    - "curl -X POST"
    - "curl -d"
    - "wget --post"
    - "Invoke-WebRequest -Method POST"

  always_blocked_write_paths:
    - "C:/Windows"
    - "C:/System32"
    - "C:/Program Files"
    - "C:/Program Files (x86)"
    - "C:/Users/Ken/Desktop/Claude"
    - "~/.ssh"
    - "~/.aws"
    - "~/.config/git/credentials"
    - ".env"
    - "credentials.json"
    - "token.json"
    - "*.pem"
    - "*.key"
