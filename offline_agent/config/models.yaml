ollama:
  base_url: "http://localhost:11434"
  timeout: 180

models:
  default: "ken-ai:latest"

  profiles:
    planner:
      model: "ken-ai:latest"
      num_ctx: 32768
      temperature: 0.2
      top_p: 0.9
      description: "Ken's voice planner — reads brain, picks tools, writes session"

    coder:
      model: "qwen2.5-coder:14b"
      num_ctx: 65536
      temperature: 0.1
      top_p: 0.95
      description: "Code generation and patching. No voice constraint — code must be correct."

    reviewer:
      model: "qwen2.5-coder:14b"
      num_ctx: 32768
      temperature: 0.0
      description: "Code review and diff analysis"

    vision:
      model: "llama3.2-vision"
      num_ctx: 8192
      temperature: 0.1
      description: "Screenshot + HUD reading — the one Ken has pulled locally"

    fast:
      model: "llama3.1:8b"
      num_ctx: 16384
      temperature: 0.2
      description: "Quick tasks, grep, summaries, JSON patches"

    recon:
      model: "cherp-piper:latest"
      num_ctx: 32768
      temperature: 0.2
      description: "Terrain mapping, memory budgeting, install tree walks"

    integration:
      model: "forgeagent:latest"
      num_ctx: 32768
      temperature: 0.2
      description: "Wiring modules, JSON config patches, daemon healing"

    quality:
      model: "jefferyjefferferson:latest"
      num_ctx: 16384
      temperature: 0.1
      description: "QA checks, rubric verification, regression risk taxonomy"

    tutor:
      model: "m3w-learning:latest"
      num_ctx: 16384
      temperature: 0.3
      description: "Prompt tuning and post-task learning reflection"

  # Fallback priority order if primary model not available
  fallback_chain:
    - "ken-ai:latest"
    - "qwen2.5-coder:14b"
    - "llama3.1:8b"
    - "qwen2.5-coder:7b"

tool_calling:
  enabled: true
  structured_output: true
  max_tool_calls_per_turn: 10
  retry_on_parse_error: true
  max_retries: 3

context:
  max_brain_chunks: 5
  max_session_history_turns: 20
  max_repo_scan_tokens: 4000
  summarize_after_turns: 15
