ollama:
  base_url: "http://localhost:11434"
  timeout: 180

models:
  target: "kenai:v4-offline-developer"
  default: "kenai:v4-offline-developer"

  profiles:
    planner:
      model: "kenai:v4-offline-developer"
      num_ctx: 32768
      temperature: 0.15
      top_p: 0.9
      description: "Target planner model for Ken V4 offline developer as the coding-first squad lead. Falls back automatically if the local tag is not built yet."
      fallback_chain:
        - "kenai:v3"
        - "ken-ai:latest"
        - "qwen2.5-coder:14b"
        - "llama3.1:8b"

    coder:
      model: "qwen2.5-coder:14b"
      num_ctx: 65536
      temperature: 0.1
      top_p: 0.95
      description: "Primary code generation and patching model."

    reviewer:
      model: "qwen2.5-coder:14b"
      num_ctx: 32768
      temperature: 0.0
      description: "Diff review, bug hunting, and regression checks."

    fast:
      model: "llama3.1:8b"
      num_ctx: 16384
      temperature: 0.2
      description: "Fast summaries, status checks, and lightweight JSON shaping."

    vision:
      model: "llama3.2-vision"
      num_ctx: 8192
      temperature: 0.1
      description: "Screenshots and UI reading for local operator workflows."

  fallback_chain:
    - "kenai:v3"
    - "ken-ai:latest"
    - "qwen2.5-coder:14b"
    - "llama3.1:8b"
    - "qwen2.5-coder:7b"

tool_calling:
  enabled: true
  structured_output: true
  max_tool_calls_per_turn: 10
  retry_on_parse_error: true
  max_retries: 3

context:
  max_brain_chunks: 5
  max_session_history_turns: 20
  max_repo_scan_tokens: 4000
  summarize_after_turns: 15
