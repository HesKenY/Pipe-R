<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ForgeAgent Remote</title>
<style>
:root {
  --bg: #0a0e14; --surface: #111822; --cyan: #00e5ff;
  --purple: #7c4dff; --green: #00e676; --red: #ff1744;
  --amber: #ffd740; --dim: #5c6b7a; --text: #e0e0e0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'SF Mono','Fira Code','Consolas',monospace;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 12px;
  -webkit-font-smoothing: antialiased;
}
.header {
  text-align: center; padding: 16px 0 8px;
  border-bottom: 1px solid #1a2332;
}
.header h1 { color: var(--cyan); font-size: 18px; letter-spacing: 4px; }
.header .sub { color: var(--dim); font-size: 11px; margin-top: 4px; }

/* Setup */
.setup-card {
  background: var(--surface); border-radius: 8px;
  padding: 20px; margin: 16px 0; text-align: center;
  border: 1px solid var(--cyan);
}
.setup-card label { color: var(--dim); font-size: 12px; display: block; margin-bottom: 8px; }
.setup-card input {
  width: 100%; max-width: 300px; padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--dim);
  border-radius: 6px; color: var(--text); font-family: inherit;
  font-size: 14px; text-align: center;
}
.setup-card input:focus { outline: none; border-color: var(--cyan); }
.setup-card .hint { color: var(--dim); font-size: 10px; margin-top: 6px; }

.conn {
  text-align: center; padding: 6px; font-size: 11px;
  color: var(--green); transition: color 0.3s;
}
.conn.off { color: var(--red); }

.card {
  background: var(--surface); border-radius: 8px;
  padding: 14px; margin: 10px 0;
  border: 1px solid #1a2332;
}
.card-title {
  color: var(--cyan); font-size: 11px; letter-spacing: 2px;
  margin-bottom: 8px; text-transform: uppercase;
}
.stat-row {
  display: flex; justify-content: space-between;
  padding: 4px 0; font-size: 13px;
}
.stat-label { color: var(--dim); }
.stat-value { color: var(--text); font-weight: bold; }
.stat-value.online { color: var(--green); }
.stat-value.offline { color: var(--red); }

.progress-wrap { margin: 8px 0; }
.progress-bar {
  height: 20px; background: #1a2332; border-radius: 10px;
  overflow: hidden; position: relative;
}
.progress-fill {
  height: 100%; border-radius: 10px; transition: width 0.5s ease;
  background: linear-gradient(90deg, var(--purple), var(--cyan));
}
.progress-text {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: bold; color: white;
}
.current-task {
  color: var(--amber); font-size: 12px; margin-top: 6px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.log-area {
  max-height: 250px; overflow-y: auto; font-size: 11px; padding: 4px 0;
}
.log-line { padding: 2px 0; border-bottom: 1px solid #0d1117; }
.log-time { color: var(--dim); margin-right: 8px; }

.task-list { font-size: 12px; }
.task { padding: 4px 0; display: flex; gap: 6px; }
.task-check { color: var(--dim); }
.task-check.done { color: var(--green); }

.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.btn {
  flex: 1; min-width: 80px; padding: 12px 8px;
  border: 1px solid var(--cyan); border-radius: 6px;
  background: transparent; color: var(--cyan);
  font-family: inherit; font-size: 12px; font-weight: bold;
  letter-spacing: 1px; cursor: pointer;
  transition: background 0.2s;
}
.btn:active { background: rgba(0,229,255,0.15); }
.btn.danger { border-color: var(--red); color: var(--red); }
.btn.danger:active { background: rgba(255,23,68,0.15); }
.btn.green { border-color: var(--green); color: var(--green); }
.btn.green:active { background: rgba(0,230,118,0.15); }
.btn.purple { border-color: var(--purple); color: var(--purple); }
.btn.purple:active { background: rgba(124,77,255,0.15); }

.agent-chip {
  display: inline-block; padding: 4px 10px; margin: 2px;
  border-radius: 12px; font-size: 11px;
  background: #1a2332; border: 1px solid var(--dim);
}
.agent-chip.running { border-color: var(--green); color: var(--green); }

/* Chat input */
.chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
.chat-input {
  flex: 1; padding: 10px 12px;
  background: var(--bg); border: 1px solid var(--dim);
  border-radius: 6px; color: var(--text); font-family: inherit; font-size: 13px;
}
.chat-input:focus { outline: none; border-color: var(--cyan); }
.chat-send {
  padding: 10px 16px; background: var(--purple);
  border: none; border-radius: 6px; color: white;
  font-family: inherit; font-size: 13px; font-weight: bold; cursor: pointer;
}

#app { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>F O R G E</h1>
  <div class="sub">REMOTE COMPANION</div>
</div>

<!-- Setup screen -->
<div id="setup">
  <div class="setup-card">
    <label>Enter your PC's local IP and port</label>
    <input type="text" id="host-input" placeholder="192.168.0.58:7777" autofocus>
    <div class="hint">Find this in ForgeAgent's welcome message under "Remote:"</div>
    <div class="btn-row" style="justify-content:center;margin-top:12px">
      <button class="btn green" onclick="connect()" style="max-width:200px">CONNECT</button>
    </div>
    <div id="setup-error" style="color:var(--red);font-size:11px;margin-top:8px"></div>
  </div>
</div>

<!-- Main app (hidden until connected) -->
<div id="app">
<div class="conn" id="conn">CONNECTED</div>

<div class="card">
  <div class="card-title">STATUS</div>
  <div class="stat-row"><span class="stat-label">Ollama</span><span class="stat-value" id="s-ollama">—</span></div>
  <div class="stat-row"><span class="stat-label">Model</span><span class="stat-value" id="s-model">—</span></div>
  <div class="stat-row"><span class="stat-label">Status</span><span class="stat-value" id="s-status">—</span></div>
  <div class="stat-row"><span class="stat-label">Datasets</span><span class="stat-value" id="s-datasets">—</span></div>
  <div class="stat-row"><span class="stat-label">Buddy</span><span class="stat-value" id="s-buddy">—</span></div>
</div>

<div class="card">
  <div class="card-title">TODO PROGRESS</div>
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="p-fill" style="width:0%"></div>
      <div class="progress-text" id="p-text">0%</div>
    </div>
  </div>
  <div class="stat-row"><span class="stat-label">Tasks</span><span class="stat-value" id="p-tasks">0/0</span></div>
  <div class="current-task" id="p-current"></div>
</div>

<div class="card">
  <div class="card-title">CONTROLS</div>
  <div class="btn-row">
    <button class="btn green" onclick="send('pause')">PAUSE</button>
    <button class="btn" onclick="send('resume')">RESUME</button>
    <button class="btn purple" onclick="send('add_task')">ADD TASK</button>
  </div>
  <div class="btn-row" style="margin-top:6px">
    <button class="btn" onclick="send('save')">SAVE</button>
    <button class="btn" onclick="send('compact')">COMPACT</button>
    <button class="btn danger" onclick="send('stop')">STOP</button>
  </div>
</div>

<!-- Chat / Message to Claude Code -->
<div class="card">
  <div class="card-title">SEND MESSAGE</div>
  <div class="chat-input-row">
    <input type="text" class="chat-input" id="chat-msg" placeholder="Type a message or task...">
    <button class="chat-send" onclick="sendChat()">SEND</button>
  </div>
</div>

<!-- Task Editor -->
<div class="card">
  <div class="card-title">SET TODO LIST</div>
  <div style="font-size:11px;color:var(--dim);margin-bottom:6px">One task per line. Replaces current pending tasks.</div>
  <textarea id="task-editor" style="width:100%;min-height:120px;background:var(--bg);color:var(--text);border:1px solid var(--dim);border-radius:6px;padding:10px;font-family:inherit;font-size:12px;resize:vertical" placeholder="Add error handling to all API endpoints
Write unit tests for the main module
Fix the login page CSS on mobile
Optimize database queries in user service"></textarea>
  <div class="btn-row" style="margin-top:8px">
    <button class="btn green" onclick="setTasks()">SET TASKS</button>
    <button class="btn" onclick="send('complete_todo')">RUN TODO</button>
    <button class="btn danger" onclick="send('restart')">RESTART</button>
  </div>
</div>

<div class="card">
  <div class="card-title">AGENTS</div>
  <div id="agents-list"><span style="color:var(--dim)">None deployed</span></div>
</div>

<div class="card">
  <div class="card-title">PENDING TASKS</div>
  <div class="task-list" id="task-list"></div>
</div>

<div class="card">
  <div class="card-title">LIVE LOG</div>
  <div class="log-area" id="log-area"></div>
</div>
</div>

<script>
let BASE = '';
let POLL_MS = 2000;
let fails = 0;

// Restore last host
const saved = localStorage.getItem('forge_host');
if (saved) document.getElementById('host-input').value = saved;

function connect() {
  let host = document.getElementById('host-input').value.trim();
  if (!host) return;
  if (!host.startsWith('http')) host = 'http://' + host;
  BASE = host;
  localStorage.setItem('forge_host', document.getElementById('host-input').value.trim());
  document.getElementById('setup-error').textContent = 'Connecting...';
  // Test connection
  fetch(BASE + '/api/state').then(r => {
    if (!r.ok) throw new Error('Bad response');
    return r.json();
  }).then(d => {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    update(d);
    poll();
  }).catch(e => {
    document.getElementById('setup-error').textContent = 'Cannot reach ' + BASE + ' — is ForgeAgent running?';
  });
}

// Auto-connect if saved
if (saved) setTimeout(connect, 500);

async function poll() {
  try {
    const r = await fetch(BASE + '/api/state');
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    fails = 0;
    document.getElementById('conn').textContent = 'CONNECTED';
    document.getElementById('conn').className = 'conn';
    update(d);
  } catch(e) {
    fails++;
    const el = document.getElementById('conn');
    el.textContent = fails > 3 ? 'OFFLINE — waiting...' : 'RECONNECTING...';
    el.className = 'conn off';
  }
  setTimeout(poll, fails > 3 ? 5000 : POLL_MS);
}

function update(d) {
  const olEl = document.getElementById('s-ollama');
  olEl.textContent = d.ollama ? 'ONLINE' : 'OFFLINE';
  olEl.className = 'stat-value ' + (d.ollama ? 'online' : 'offline');
  document.getElementById('s-model').textContent = d.model || '—';
  document.getElementById('s-status').textContent = (d.todo_status || 'idle').toUpperCase();
  document.getElementById('s-datasets').textContent = d.datasets;
  document.getElementById('s-buddy').textContent = d.buddy_name + ' Lv.' + d.buddy_level + ' (' + d.buddy_mood + ')';

  const pct = d.todo_pct || 0;
  document.getElementById('p-fill').style.width = pct + '%';
  document.getElementById('p-text').textContent = pct + '%';
  document.getElementById('p-tasks').textContent = d.todo_completed + '/' + d.todo_total;
  document.getElementById('p-current').textContent = d.todo_current || '';

  const agEl = document.getElementById('agents-list');
  if (d.agents && d.agents.length) {
    agEl.innerHTML = d.agents.map(a =>
      '<span class="agent-chip ' + (a.status === 'running' ? 'running' : '') + '">' + a.name + '</span>'
    ).join('');
  } else {
    agEl.innerHTML = '<span style="color:var(--dim)">None deployed</span>';
  }

  const tl = document.getElementById('task-list');
  let taskHtml = '';
  (d.completed_tasks || []).forEach(t => {
    taskHtml += '<div class="task"><span class="task-check done">&#10003;</span>' + esc(t) + '</div>';
  });
  (d.pending_tasks || []).forEach(t => {
    taskHtml += '<div class="task"><span class="task-check">&#9675;</span>' + esc(t) + '</div>';
  });
  tl.innerHTML = taskHtml || '<span style="color:var(--dim)">No tasks</span>';

  const la = document.getElementById('log-area');
  const atBottom = la.scrollTop + la.clientHeight >= la.scrollHeight - 20;
  la.innerHTML = (d.log || []).map(l =>
    '<div class="log-line"><span class="log-time">' + l.time + '</span>' + esc(l.msg) + '</div>'
  ).join('');
  if (atBottom) la.scrollTop = la.scrollHeight;
}

function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

async function send(cmd) {
  if (cmd === 'add_task') {
    const task = prompt('Enter task for agents:');
    if (!task) return;
    cmd = 'add_task:' + task;
  }
  try {
    await fetch(BASE + '/api/command', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({command: cmd})
    });
  } catch(e) {}
}

function sendChat() {
  const input = document.getElementById('chat-msg');
  const msg = input.value.trim();
  if (!msg) return;
  send('chat:' + msg);
  input.value = '';
}

async function setTasks() {
  const editor = document.getElementById('task-editor');
  const lines = editor.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (!lines.length) { alert('Enter at least one task'); return; }
  try {
    await fetch(BASE + '/api/tasks', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({tasks: lines})
    });
    editor.value = '';
    alert('Tasks set! Click RUN TODO to start.');
  } catch(e) { alert('Failed to set tasks'); }
}

document.getElementById('chat-msg').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendChat();
});
</script>
</body>
</html>
